alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 2000 for 10m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 3 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: pii_leaks_detected
    severity: P0
    condition: redact_count > 0 for 1m
    type: security-based
    owner: security-oncall
    runbook: docs/alerts.md#4-pii-leaks-detected
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 1.5x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
